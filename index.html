<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Top 10 Premium Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --primary: #5cb85c;
      --primary-dark: #4cae4c;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --border: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-user-select: none;
      user-select: none;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a252f;
      margin: 10px 0 16px 0;
      text-align: center;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 5px;
    }

    /* List Container */
    .list-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Premium Review Card Style from image_dd14c7.png */
    .deal-card {
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      position: relative;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Ribbon Badge */
    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* Card Layout Row */
    .card-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .card-text-side {
      flex: 1;
    }

    /* Smaller Right-aligned Square Image */
    .deal-image {
      width: 75px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    
    .deal-title {
      font-size: 16px;
      font-weight: 700;
      color: #2c3e50;
      cursor: pointer;
      text-decoration: underline;
      line-height: 1.3;
      margin-bottom: 4px;
      padding-right: 80px; /* Space for badge */
    }

    .deal-summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Pros & Cons Section mimicking screenshot */
    .pros-cons {
      background: #fdfefe;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
      font-size: 12px;
    }
    .pro-item { color: #27ae60; margin-bottom: 3px; display: flex; align-items: center; gap: 5px;}
    .con-item { color: #c0392b; display: flex; align-items: center; gap: 5px; }

    /* Compact Premium Clean Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      padding: 16px;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 340px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      position: relative;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #2c3e50;
      line-height: 1.3;
    }

    .modal-desc {
      font-size: 13px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 20px;
      background: #f8fafc;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .btn-go {
      width: 100%;
      padding: 12px;
      background-color: var(--primary);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-go:hover { background-color: var(--primary-dark); }

    .close-btn {
      position: absolute;
      top: 10px; right: 14px;
      font-size: 22px;
      color: #aaa;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🏆 Top 10 Best Deals Today 🏆</h1>

  <div class="list-container" id="dealsContainer"></div>

  <!-- Description Modal -->
  <div class="modal-overlay" id="descModal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <div class="modal-title" id="modalTitle">Deal Title</div>
      <div class="modal-desc" id="modalDesc">Loading description...</div>
      <button class="btn-go" id="goButton">Sign Up Here</button>
    </div>
  </div>

<script>
  // ==========================================
  // 🛑 আপনার MONETAG DIRECT LINK এখানে বসান 🛑
  // ==========================================
  const monetagDirectLink = "YOUR_MONETAG_DIRECT_LINK_HERE";

  const dealsData = [
    {
      id: 1,
      title: "1. Swagbucks",
      tag: "Best for Quick Surveys",
      image: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=150", 
      summary: "Swagbucks has paid out over $650 million to users over the last 10+ years.",
      description: "This is a highly recommended limited-time giveaway and survey program. Create a free account, complete microtasks, and grab your instant sign-up reward today!",
      pro: "Quick and easy to use",
      con: "Surveys don't pay much",
      affiliateUrl: "https://your-affiliate-link-1.com"
    },
    {
      id: 2,
      title: "2. InboxDollars",
      tag: "Best Sign-up Bonus",
      image: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=150",
      summary: "Get a free $5 bonus just for joining and verifying your official email.",
      description: "Earn real money for watching videos, shopping online, and sharing your opinions. Cashout instantly via PayPal or popular retail gift cards.",
      pro: "$5 instant sign-up bonus",
      con: "High minimum cashout limit",
      affiliateUrl: "https://your-affiliate-link-2.com"
    }
  ];

  // অটোমেটিক বাকি ১০টি ডিল জেনারেট করার লুপ
  for (let i = 3; i <= 10; i++) {
    dealsData.push({
      id: i,
      title: `${i}. Secret Earning App`,
      tag: "Top Rated Method",
      image: "https://images.unsplash.com/photo-1616077168079-7e09a677fb2c?w=150",
      summary: `Learn how to make steady side income daily using your phone setup.`,
      description: `Step-by-step guidance to unlock premium monetization tasks. Read everything thoroughly on the landing page after clicking the button below.`,
      pro: "Automatic high payout rate",
      con: "Requires stable internet connection",
      affiliateUrl: `https://your-affiliate-link-${i}.com`
    });
  }

  const container = document.getElementById('dealsContainer');
  let currentTarget = null;

  dealsData.forEach(deal => {
    const card = document.createElement('div');
    card.className = 'deal-card';
    card.innerHTML = `
      <div class="badge">${deal.tag}</div>
      <div class="card-top">
        <div class="card-text-side">
          <div class="deal-title" onclick="handleTitleClick(${deal.id})">${deal.title}</div>
          <div class="deal-summary">${deal.summary}</div>
        </div>
        <img src="${deal.image}" class="deal-image" alt="Image">
      </div>
      <div class="pros-cons">
        <div class="pro-item">✔ ${deal.pro}</div>
        <div class="con-item">✘ ${deal.con}</div>
      </div>
    `;
    container.appendChild(card);
  });

  function handleTitleClick(id) {
    currentTarget = dealsData.find(d => d.id === id);
    if (currentTarget) {
      window.open(monetagDirectLink, '_blank');
      document.getElementById('modalTitle').textContent = currentTarget.title;
      document.getElementById('modalDesc').textContent = currentTarget.description;
      document.getElementById('goButton').onclick = handleGoClick;
      document.getElementById('descModal').classList.add('active');
    }
  }

  function handleGoClick() {
    if (currentTarget) {
      window.open(monetagDirectLink, '_blank');
      setTimeout(() => {
        window.open(currentTarget.affiliateUrl, '_blank');
        closeModal();
      }, 1000);
    }
  }

  function closeModal() {
    document.getElementById('descModal').classList.remove('active');
  }
</script>
</body>
</html>
