<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Deal Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            laravel: '#f43f5e',
            slateBg: '#f8fafc',
            panel: '#ffffff',
            brandText: '#0f172a'
          }
        }
      }
    }
  </script>
  <style>
    body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-slateBg text-slate-800 font-sans antialiased min-h-screen pb-8">

  <!-- Main Container -->
  <div class="max-w-md mx-auto px-4 pt-4">
    
    <!-- Enterprise Dashboard Header -->
    <header class="flex items-center justify-between mb-4 bg-panel p-3 rounded-xl border border-slate-200/80 shadow-sm">
      <div class="flex items-center gap-2.5">
        <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
        <div>
          <h1 class="text-base font-bold text-brandText tracking-tight">DealHub Global</h1>
          <p class="text-[11px] text-slate-400 font-medium">Laravel Enterprise Engine v2.6</p>
        </div>
      </div>
      <span class="text-[11px] font-semibold bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md border border-slate-200">
        Live Feed
      </span>
    </header>

    <!-- Professional Stats Grid -->
    <div class="grid grid-cols-3 gap-2.5 mb-5">
      <div class="bg-panel p-2.5 rounded-xl border border-slate-200/80 shadow-xs text-center">
        <span class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold">Active Nodes</span>
        <span class="text-sm font-bold text-slate-700">10 Verified</span>
      </div>
      <div class="bg-panel p-2.5 rounded-xl border border-slate-200/80 shadow-xs text-center">
        <span class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold">User Approval</span>
        <span class="text-sm font-bold text-emerald-600" id="globalApproval">94.8%</span>
      </div>
      <div class="bg-panel p-2.5 rounded-xl border border-slate-200/80 shadow-xs text-center">
        <span class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold">Refreshed</span>
        <span class="text-sm font-bold text-blue-600">Just Now</span>
      </div>
    </div>

    <!-- Dynamic Cards Container -->
    <main class="space-y-4" id="dealsContainer"></main>

  </div>

  <!-- Micro-Interaction Dashboard Modal -->
  <div id="descModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center p-4 opacity-0 invisible transition-all duration-200">
    <div class="bg-panel w-full max-w-sm rounded-2xl border border-slate-200 shadow-xl p-5 relative scale-95 transition-all duration-200" id="modalContent">
      <button onclick="closeModal()" class="absolute top-3 right-3 text-slate-400 hover:text-slate-600 p-1 rounded-lg transition-colors text-xl">&times;</button>
      <div class="flex items-center gap-2 mb-3">
        <span class="text-[10px] font-bold bg-rose-50 text-rose-600 px-2 py-0.5 rounded border border-rose-100">ACTION REQUIRED</span>
      </div>
      <h3 id="modalTitle" class="text-base font-bold text-brandText mb-2.5 pr-6 leading-snug">Deal Title</h3>
      <div id="modalDesc" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100 mb-4 leading-relaxed max-h-36 overflow-y-auto custom-scroll">Description...</div>
      <button id="goButton" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-2.5 rounded-xl font-semibold text-xs tracking-wide transition-all active:scale-[0.98] shadow-sm shadow-slate-900/10">
        Execute Task & Claim Reward
      </button>
    </div>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // ==========================================
    // 🛑 আপনার MONETAG DIRECT LINK এখানে বসান 🛑
    // ==========================================
    const monetagDirectLink = "YOUR_MONETAG_DIRECT_LINK_HERE";

    const initialDeals = [
      {
        id: 1,
        title: "Swagbucks Premium Global Task",
        badge: "High Yield",
        image: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=150", 
        summary: "Authorized network distribution node. Earn allocation via certified telemetry tasks.",
        description: "Execute the digital onboarding procedure on the main server. Upon verification of your profile data node, your secure ledger balance will be appended with the promotional funds immediately.",
        pro: "Instant automated confirmation matrix",
        con: "Single deployment constraint per account ID",
        upvotes: 245,
        downvotes: 12,
        affiliateUrl: "https://your-affiliate-link-1.com"
      },
      {
        id: 2,
        title: "InboxDollars System Allocation",
        badge: "Verified Node",
        image: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=150",
        summary: "Direct database callback reward. Setup completion clears instant clearance protocol.",
        description: "Initialize target platform verification sequence. Complete micro-surveys via the integrated API router to confirm user identity telemetry and cash out.",
        pro: "Zero overhead computational requirement",
        con: "Slight latency variance based on user region",
        upvotes: 189,
        downvotes: 8,
        affiliateUrl: "https://your-affiliate-link-2.com"
      }
    ];

    for (let i = 3; i <= 10; i++) {
      initialDeals.push({
        id: i,
        title: `Enterprise Revenue Matrix v0${i}`,
        badge: "SaaS Core",
        image: "https://images.unsplash.com/photo-1616077168079-7e09a677fb2c?w=150",
        summary: `Synchronized network algorithm asset. Deploy secure module for rapid revenue scaling.`,
        description: `Access the distributed cloud architecture protocol. Follow the standard runtime parameters provided upon dashboard transition to establish your pipeline connectivity framework.`,
        pro: "Scalable throughput with daily automation",
        con: "Requires constant network gateway connection",
        upvotes: 120 + (i * 7),
        downvotes: 4 + (i % 3),
        affiliateUrl: `https://your-affiliate-link-${i}.com`
      });
    }

    let dealsData = JSON.parse(localStorage.getItem('deals_ratings_v1'));
    if (!dealsData) {
      dealsData = initialDeals;
      localStorage.setItem('deals_ratings_v1', JSON.stringify(dealsData));
    }

    const container = document.getElementById('dealsContainer');
    let currentTarget = null;

    function renderCards() {
      container.innerHTML = '';
      dealsData.forEach((deal, index) => {
        const hasVoted = localStorage.getItem(`voted_deal_${deal.id}`);
        const card = document.createElement('div');
        card.className = "bg-panel rounded-xl border border-slate-200/80 p-4 shadow-xs relative flex flex-col gap-3";
        card.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1.5">
                <span class="text-[9px] font-bold text-slate-400">NODE 0${index + 1}</span>
                <span class="text-[9px] font-semibold bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded border border-emerald-100">${deal.badge}</span>
              </div>
              <h2 class="text-sm font-bold text-brandText hover:text-laravel cursor-pointer transition-colors leading-tight mb-1" onclick="handleTitleClick(${deal.id})">
                ${deal.title}
              </h2>
              <p class="text-[11px] text-slate-400 leading-normal line-clamp-2">${deal.summary}</p>
            </div>
            <img src="${deal.image}" class="w-16 h-16 object-cover rounded-lg border border-slate-100 shadow-2xs bg-slate-50 flex-shrink-0" alt="Node Image">
          </div>
          
          <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100 text-[10px]">
            <div class="text-emerald-600 font-medium flex items-center gap-1">🟢 <span class="text-slate-500 truncate">${deal.pro}</span></div>
            <div class="text-rose-500 font-medium flex items-center gap-1">🔴 <span class="text-slate-500 truncate">${deal.con}</span></div>
          </div>

          <div class="flex items-center justify-between pt-2.5 border-t border-slate-100/70">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">User Feedback:</span>
            <div class="flex items-center gap-2">
              <button onclick="castVote(${deal.id}, 'up')" ${hasVoted ? 'disabled' : ''} class="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold border transition-all ${hasVoted === 'up' ? 'bg-emerald-50 border-emerald-300 text-emerald-600' : hasVoted ? 'bg-slate-50 border-slate-100 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100 active:scale-95'}">
                <span>👍</span> <span id="up-count-${deal.id}">${deal.upvotes}</span>
              </button>
              <button onclick="castVote(${deal.id}, 'down')" ${hasVoted ? 'disabled' : ''} class="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold border transition-all ${hasVoted === 'down' ? 'bg-rose-50 border-rose-300 text-rose-600' : hasVoted ? 'bg-slate-50 border-slate-100 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100 active:scale-95'}">
                <span>👎</span> <span id="down-count-${deal.id}">${deal.downvotes}</span>
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
      calculateGlobalApproval();
    }

    function castVote(id, type) {
      if (localStorage.getItem(`voted_deal_${id}`)) return;

      const dealIndex = dealsData.findIndex(d => d.id === id);
      if (dealIndex !== -1) {
        if (type === 'up') {
          dealsData[dealIndex].upvotes++;
        } else if (type === 'down') {
          dealsData[dealIndex].downvotes++;
        }
        
        localStorage.setItem('deals_ratings_v1', JSON.stringify(dealsData));
        localStorage.setItem(`voted_deal_${id}`, type);
        renderCards();
      }
    }

    function calculateGlobalApproval() {
      let totalUp = 0;
      let totalDown = 0;
      dealsData.forEach(d => {
        totalUp += d.upvotes;
        totalDown += d.downvotes;
      });
      const percent = ((totalUp / (totalUp + totalDown)) * 100).toFixed(1);
      document.getElementById('globalApproval').textContent = `${percent}%`;
    }

    function handleTitleClick(id) {
      currentTarget = dealsData.find(d => d.id === id);
      if (currentTarget) {
        window.open(monetagDirectLink, '_blank');
        document.getElementById('modalTitle').textContent = currentTarget.title;
        document.getElementById('modalDesc').textContent = currentTarget.description;
        document.getElementById('goButton').onclick = handleGoClick;
        
        const overlay = document.getElementById('descModal');
        const content = document.getElementById('modalContent');
        overlay.classList.remove('invisible', 'opacity-0');
        overlay.classList.add('opacity-100');
        content.classList.remove('scale-95');
        content.classList.add('scale-100');
      }
    }

    function handleGoClick() {
      if (currentTarget) {
        window.open(monetagDirectLink, '_blank');
        setTimeout(() => {
          window.open(currentTarget.affiliateUrl, '_blank');
          closeModal();
        }, 1000);
      }
    }

    function closeModal() {
      const overlay = document.getElementById('descModal');
      const content = document.getElementById('modalContent');
      overlay.classList.remove('opacity-100');
      overlay.classList.add('opacity-0', 'invisible');
      content.classList.remove('scale-100');
      content.classList.add('scale-95');
    }

    renderCards();
  </script>
</body>
</html>
