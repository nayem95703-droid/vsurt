<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Top 10 Best Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #1f2833;
      --primary: #45f3ff;
      --text-main: #ffffff;
      --text-muted: #c5a059;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-user-select: none;
      user-select: none;
    }

    h1 {
      font-size: 18px;
      font-weight: 800;
      margin: 10px 0 14px 0;
      text-align: center;
      background: linear-gradient(90deg, #45f3ff, #66fcf1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    /* Compact List Container */
    .list-container {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Sleek Mobile Card */
    .deal-card {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.04);
      transition: transform 0.2s;
    }
    .deal-card:active { transform: scale(0.98); }

    /* Reduced Image Height for Mobile */
    .deal-image {
      width: 100%;
      height: 130px;
      object-fit: cover;
    }

    .deal-details { 
      padding: 10px 12px; 
    }
    
    .deal-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
      text-decoration: underline;
      display: inline-block;
      line-height: 1.3;
    }
    .click-hint {
      font-size: 11px;
      color: #8e9bb0;
      display: block;
      margin-top: 4px;
    }

    /* Compact Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s ease;
      padding: 16px;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: #151922;
      border: 1.5px solid var(--primary);
      width: 100%;
      max-width: 340px;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      position: relative;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary);
      padding-right: 15px;
      line-height: 1.3;
    }

    .modal-desc {
      font-size: 13px;
      line-height: 1.4;
      color: #d1d5db;
      margin-bottom: 18px;
      text-align: left;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 8px;
      max-height: 160px;
      overflow-y: auto;
    }

    .btn-go {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #45f3ff, #0080ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(69, 243, 255, 0.2);
    }
    .btn-go:active { transform: scale(0.97); }

    .close-btn {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 20px;
      color: #888;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🔥 TOP 10 EXCLUSIVE DEALS 🔥</h1>

  <div class="list-container" id="dealsContainer"></div>

  <div class="modal-overlay" id="descModal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <div class="modal-title" id="modalTitle">Product Title</div>
      <div class="modal-desc" id="modalDesc">Product Description...</div>
      <button class="btn-go" id="goButton">👉 (GO) 👈</button>
    </div>
  </div>

<script>
  // ==========================================
  // 🛑 আপনার MONETAG DIRECT LINK এখানে বসান 🛑
  // ==========================================
  const monetagDirectLink = "YOUR_MONETAG_DIRECT_LINK_HERE";

  const dealsData = [
    {
      id: 1,
      title: "1. 🎁 Get Free $100 Gift Card Now!",
      image: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=500", 
      description: "This is a special limited-time giveaway offer. Anyone from any country can participate. Read instructions carefully on the next page and submit your email to win!",
      affiliateUrl: "https://your-affiliate-link-1.com"
    },
    {
      id: 2,
      title: "2. 📱 Win a Brand New iPhone 15 Pro",
      image: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=500",
      description: "Enter the official iPhone raffle draw today. Only 5 lucky winners will be selected this week. Complete the quick survey after clicking GO to lock your entry.",
      affiliateUrl: "https://your-affiliate-link-2.com"
    }
  ];

  for (let i = 3; i <= 10; i++) {
    dealsData.push({
      id: i,
      title: `${i}. 💰 Secret Online Earning Method 2026`,
      image: "https://images.unsplash.com/photo-1616077168079-7e09a677fb2c?w=500",
      description: `This is deal number ${i}. Learn how to make $10-$50 daily using your smartphone. Genuine platform with instant automatic cashout. Click GO to check proof!`,
      affiliateUrl: `https://your-affiliate-link-${i}.com`
    });
  }

  const container = document.getElementById('dealsContainer');
  let currentTarget = null;

  dealsData.forEach(deal => {
    const card = document.createElement('div');
    card.className = 'deal-card';
    card.innerHTML = `
      <img src="${deal.image}" class="deal-image" alt="Deal Image">
      <div class="deal-details">
        <span class="deal-title" onclick="handleTitleClick(${deal.id})">${deal.title}</span>
        <span class="click-hint">➔ Click title to view details & link</span>
      </div>
    `;
    container.appendChild(card);
  });

  function handleTitleClick(id) {
    currentTarget = dealsData.find(d => d.id === id);
    if (currentTarget) {
      window.open(monetagDirectLink, '_blank');
      document.getElementById('modalTitle').textContent = currentTarget.title;
      document.getElementById('modalDesc').textContent = currentTarget.description;
      document.getElementById('goButton').onclick = handleGoClick;
      document.getElementById('descModal').classList.add('active');
    }
  }

  function handleGoClick() {
    if (currentTarget) {
      window.open(monetagDirectLink, '_blank');
      setTimeout(() => {
        window.open(currentTarget.affiliateUrl, '_blank');
        closeModal();
      }, 1000);
    }
  }

  // ✅ এখানে 'def' এর জায়গায় 'function' ঠিক করে দেওয়া হয়েছে
  function closeModal() {
    document.getElementById('descModal').classList.remove('active');
  }
</script>
</body>
</html>
